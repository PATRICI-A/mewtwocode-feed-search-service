spring.application.name=m06-feed-busqueda


# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/m06_feed}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:patricia}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:patricia}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.security.oauth2.resourceserver.jwt.secret=patriciasecret

# ── Redis ───────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:patriciaSecretKeyForJwtValidation2025!}

# ── Servidor ─────────────────────────────────────────────────
server.port=8081

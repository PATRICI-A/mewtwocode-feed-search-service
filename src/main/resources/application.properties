spring.application.name=m06-feed-busqueda

# Default mode: run the backend directly without Docker, PostgreSQL, or Redis.
# Swagger UI: http://localhost:8081/swagger-ui.html
server.port=${SERVER_PORT:8081}

# In-memory database for local standalone execution.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:m06_feed;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 console is useful when running only the backend.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis is intentionally disabled by default so Maven/local runs do not need Docker.
spring.cache.type=none

jwt.secret=${JWT_SECRET:patriciaSecretKeyForJwtValidation2025!}

springdoc.swagger-ui.lang=en

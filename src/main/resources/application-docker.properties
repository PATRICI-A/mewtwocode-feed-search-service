spring.application.name=m06-feed-busqueda

# Docker mode: the app container uses PostgreSQL and Redis containers from docker-compose.
# Swagger UI: http://localhost:8080/swagger-ui.html
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/m06_feed}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:patricia}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:patricia}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.cache.type=redis

jwt.secret=${JWT_SECRET:patriciaSecretKeyForJwtValidation2025!}

springdoc.swagger-ui.lang=en

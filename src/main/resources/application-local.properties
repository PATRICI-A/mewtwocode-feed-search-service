# Perfil local — sin Docker, sin PostgreSQL, sin Redis
# Usar con: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

# ── Base de datos en memoria (H2) ────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── H2 Console (solo perfil local) ──────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Puerto alternativo para no chocar con Docker ─────────────
server.port=8081

# ── Cache desactivado (sin Redis) ────────────────────────────
spring.cache.type=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

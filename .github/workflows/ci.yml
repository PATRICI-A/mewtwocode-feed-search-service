name: CI — M06 Feed & Search

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw compile -Djacoco.skip=true -q

      - name: Ejecutar tests y generar reporte JaCoCo
        run: ./mvnw verify
        env:
          JWT_SECRET_TEST: ${{ secrets.JWT_SECRET_TEST }}

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Publicar reporte Surefire
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-report
          path: target/surefire-reports/

      - name: Construir imagen Docker
        run: docker build -t m06-feed-search:${{ github.sha }} .

      - name: Publicar JAR para despliegue
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1
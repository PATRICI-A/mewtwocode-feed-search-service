name: CI — M06 Feed y Búsqueda

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Dar permisos
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw compile -Djacoco.skip=true -q

      - name: Ejecutar tests
        run: ./mvnw test -Djacoco.skip=true

      - name: Construir imagen Docker
        run: docker build -t m06-feed-busqueda:${{ github.sha }} .
